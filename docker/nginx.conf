# nginx bên trong container FE. nginx của BE (infra/nginx/nginx.prod.conf)
# proxy_pass vào đây, nên ở đây không cần TLS, không cần tên miền.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check để BE compose / deploy workflow kiểm tra container sống.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Asset đã có hash trong tên file nên cache vĩnh viễn được.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA dùng BrowserRouter: mọi path không phải file thật đều trả index.html,
    # nếu không thì F5 ở /manager/dashboard hay /payments/return sẽ 404.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
