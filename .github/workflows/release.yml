name: Release (auto)

# Pipeline tự động hoàn toàn, mirror của repo BE:
#   push main → CI → (workflow này) → tính version → tag → build image → deploy → health check
#
# Trigger là workflow_run trên CI chứ KHÔNG phải push. Đó chính là chốt an toàn:
# CI đỏ thì các job dưới bị skip và không có gì lên production. CI xanh là điều kiện
# cần nhưng chưa đủ (CI chạy với env giả), nên bước deploy vẫn health-check domain
# thật, và deploy.yml vẫn giữ đường dispatch tay để rollback về tag cũ.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write # để push tag version
  packages: write # job build đẩy image lên GHCR

concurrency:
  group: release-frontend-main
  cancel-in-progress: false

jobs:
  version:
    name: Compute + push version tag
    # Chỉ release khi CI mà workflow này phản ứng lại thực sự đã pass.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Tag đúng commit mà CI đã kiểm, không phải commit mới nhất trên main:
          # giữa lúc CI chạy có thể đã có commit khác được merge vào.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute next semver from Conventional Commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # feat → minor, fix → patch, feat!/"BREAKING CHANGE" → major.
          # Commit không theo convention vẫn ra patch, để mọi merge đều có release.
          default_bump: patch
          tag_prefix: v

  build:
    name: Build image
    needs: version
    if: ${{ needs.version.outputs.new_tag != '' }}
    uses: ./.github/workflows/docker-build.yml
    with:
      tag: ${{ needs.version.outputs.new_tag }}
    secrets: inherit

  deploy:
    name: Deploy to production
    needs: [version, build]
    uses: ./.github/workflows/deploy.yml
    with:
      tag: ${{ needs.version.outputs.new_tag }}
    secrets: inherit
