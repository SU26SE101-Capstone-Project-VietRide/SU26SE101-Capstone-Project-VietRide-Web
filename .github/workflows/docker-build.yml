name: Build & push image

# Tách build khỏi deploy giống pipeline BE: build đẩy image lên GHCR, deploy chỉ
# pull. Nhờ vậy rollback = chạy lại deploy với tag cũ, không phải build lại.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag gán cho image (ngoài sha)"
        required: false
        type: string
        default: "latest"
  # release.yml gọi vào đây để pipeline tự động dùng lại đúng build này,
  # thay vì nhân bản logic build ra chỗ khác.
  workflow_call:
    inputs:
      tag:
        description: "Version tag cần build (vd v1.2.3)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          # GHCR từ chối chữ hoa trong đường dẫn image, mà tên repo này có hoa.
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          # inputs.tag thắng: khi release.yml gọi qua workflow_call thì GITHUB_REF
          # là ref của caller (main), không phải tag — dựa vào ref sẽ ra sai version.
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev"
          fi
          echo "list=${IMAGE}:${SHORT_SHA},${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building ${IMAGE}:${VERSION} (+ :${SHORT_SHA})"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.list }}
          # Rỗng = same-origin. Chỉ set khác nếu FE chạy ở domain riêng.
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
